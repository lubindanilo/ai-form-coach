server {
  listen 80;
  listen [::]:80;
  server_name api.formetry.io;

  # Let's Encrypt HTTP-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.formetry.io;

  # Certbot will populate these paths.
  ssl_certificate /etc/letsencrypt/live/api.formetry.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.formetry.io/privkey.pem;

  # Good defaults; can be tightened further later.
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Uploads (video/images) can be large; align with your actual needs.
  client_max_body_size 50m;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Websocket upgrade (safe even if unused)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Reasonable timeouts for scoring calls
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }
}
