services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      # Persistance Mongo via un disque Hetzner monté sur le VPS
      - /mnt/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  detection:
    build:
      context: ../services/detection
    restart: unless-stopped
    environment:
      - DATASET_CSV_PATH=/app/data/datasets/pose_samples.csv
      - POSE_DEBUG=1
      - LOG_LEVEL=INFO
    volumes:
      - ../data/datasets:/app/data/datasets
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read();\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  scoring:
    build:
      context: ../services/scoring
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read();\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    depends_on:
      - mongo
      - detection
      - scoring
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10